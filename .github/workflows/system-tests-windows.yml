# GitHub Actions workflow for Windows system tests
# Architecture: TeamCity server + agent both as Java processes on GitHub-hosted Windows runner
#
# Requirements:
#   - GitHub-hosted windows-latest runner

name: System Tests (Windows)

on:
  pull_request:
    branches: [main]
    paths:
      - 'matlab-plugin-agent/**'
      - 'matlab-plugin-server/**'
      - 'matlab-plugin-common/**'
      - 'build/**'
      - 'pom.xml'
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  system-test-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      TC_URL: 'http://localhost:8111'
      SERVER_DIR: 'C:\TeamCity'
      DATA_DIR: 'C:\TeamCity-data'
      AGENT_DIR: 'C:\BuildAgent'
      TC_VERSION: '2026.1.1'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java (JDK 21)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: pip install requests

      - name: Build plugin
        run: mvn package -DskipTests -q

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3

      - name: Cache TeamCity distribution
        uses: actions/cache@v6
        with:
          path: ${{ env.TEMP }}\TeamCity-${{ env.TC_VERSION }}.tar.gz
          key: teamcity-${{ env.TC_VERSION }}

      - name: Install TeamCity server
        run: python -u install_server.py
        working-directory: systemtest/ci-windows
        env:
          PLUGIN_ZIP: ${{ github.workspace }}\target\matlab-plugin.zip

      - name: Setup TeamCity server
        run: python -u setup_teamcity.py server-only
        working-directory: systemtest/ci-windows

      - name: Install TeamCity agent
        run: python -u install_agent.py
        working-directory: systemtest/ci-windows

      - name: Authorize agent
        run: python -u setup_teamcity.py agent-only
        working-directory: systemtest/ci-windows

      - name: Configure project
        run: python -u configure_project.py
        working-directory: systemtest

      - name: Run builds
        run: python -u run_builds.py
        working-directory: systemtest

      - name: Collect server logs
        if: always()
        run: |
          mkdir -p server-logs
          cp -r /c/TeamCity/logs/* server-logs/ 2>/dev/null || true
        shell: bash

      - name: Collect agent logs
        if: always()
        run: |
          mkdir -p agent-logs
          cp -r /c/BuildAgent/logs/* agent-logs/ 2>/dev/null || true
        shell: bash

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: system-test-windows-logs
          path: |
            server-logs/
            agent-logs/

